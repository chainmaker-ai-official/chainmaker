<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Word Carousel - Click to Advance</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #instructions {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="instructions">Click the center word to rotate</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
    import GUI from 'lil-gui';

    let scene, camera, renderer, raycaster, mouse;
    let wordGroup = new THREE.Group();
    let currentRotation = 0;
    let targetRotation = 0;
    
    const params = {
        radius: 15,
        words: ["EVOLVE", "CREATE", "INTERACT", "EXPLORE", "DESIGN"],
        lerpSpeed: 0.08
    };

    init();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 35); // Pulled back for a cinematic view

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(0, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        const loader = new FontLoader();
        loader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
            params.words.forEach((txt, i) => {
                const geo = new TextGeometry(txt, {
                    font: font, size: 2, height: 0.5, bevelEnabled: true, bevelSize: 0.05
                });
                geo.center();
                
                const mat = new THREE.MeshPhongMaterial({ color: 0x00ffcc });
                const mesh = new THREE.Mesh(geo, mat);
                
                const angle = (i / params.words.length) * Math.PI * 2;
                mesh.position.set(Math.sin(angle) * params.radius, 0, Math.cos(angle) * params.radius);
                
                // Make words face outward from the center
                mesh.lookAt(new THREE.Vector3(
                    Math.sin(angle) * (params.radius + 5), 0, Math.cos(angle) * (params.radius + 5)
                ));

                wordGroup.add(mesh);
            });
            scene.add(wordGroup);
        });

        window.addEventListener('click', onMouseClick);
        window.addEventListener('resize', onWindowResize);
        
        animate();
    }

    function onMouseClick(event) {
        // Calculate mouse position in normalized device coordinates
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(wordGroup.children);

        if (intersects.length > 0) {
            // Calculate the angle increment (360 / number of words)
            const angleStep = (Math.PI * 2) / params.words.length;
            targetRotation -= angleStep; // Subtract to move "forward"
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Smoothly rotate the group toward the target rotation
        currentRotation = THREE.MathUtils.lerp(currentRotation, targetRotation, params.lerpSpeed);
        wordGroup.rotation.y = currentRotation;

        renderer.render(scene, camera);
    }
</script>
</body>
</html>

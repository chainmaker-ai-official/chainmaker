<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case Component Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #0a1525;
            color: #abb2bf;
        }
        .test-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .test-section {
            background: #1e2127;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3a4a5a;
        }
        .test-section h2 {
            margin: 0 0 10px 0;
            color: #56b6c2;
        }
        .test-section p {
            margin: 5px 0;
            color: #abb2bf;
        }
        .test-section button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .test-section button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-section">
            <h2>Switch Case Component Test</h2>
            <p>This page tests the new SwitchCase component functionality.</p>
            <div id="switch-case-test"></div>
        </div>
    </div>

    <script type="text/babel">
        import React, { useState } from 'react';
        import ReactDOM from 'react-dom';
        import SwitchCase from './src/components/Designer/Blocks/SwitchCase';

        function TestSwitchCase() {
            const [cases, setCases] = useState([
                { condition: 'A', output: 'Output A' },
                { condition: 'B', output: 'Output B' }
            ]);
            const [defaultCase, setDefaultCase] = useState('Default Output');

            const handleAddCase = () => {
                setCases([...cases, { condition: '', output: '' }]);
            };

            const handleRemoveCase = (index) => {
                if (cases.length > 1) {
                    const newCases = cases.filter((_, i) => i !== index);
                    setCases(newCases);
                }
            };

            const handleCaseChange = (index, condition) => {
                const newCases = [...cases];
                newCases[index].condition = condition;
                setCases(newCases);
            };

            const handleCaseOutputChange = (index, output) => {
                const newCases = [...cases];
                newCases[index].output = output;
                setCases(newCases);
            };

            const handleDefaultChange = (value) => {
                setDefaultCase(value);
            };

            return (
                <div style={{ padding: '20px', background: '#1e2127', borderRadius: '8px' }}>
                    <h3>Switch Case Component</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                        {cases.map((caseItem, index) => (
                            <div key={index} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                <input
                                    type="text"
                                    value={caseItem.condition}
                                    placeholder="condition"
                                    onChange={(e) => handleCaseChange(index, e.target.value)}
                                    style={{ padding: '4px', width: '100px' }}
                                />
                                <span>→</span>
                                <input
                                    type="text"
                                    value={caseItem.output}
                                    placeholder="output"
                                    onChange={(e) => handleCaseOutputChange(index, e.target.value)}
                                    style={{ padding: '4px', width: '120px' }}
                                />
                                <button onClick={() => handleRemoveCase(index)}>Remove</button>
                            </div>
                        ))}
                        <button onClick={handleAddCase}>Add Case</button>
                        <div style={{ marginTop: '10px' }}>
                            <label>Default: </label>
                            <input
                                type="text"
                                value={defaultCase}
                                placeholder="default output"
                                onChange={(e) => handleDefaultChange(e.target.value)}
                                style={{ padding: '4px', width: '200px' }}
                            />
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('switch-case-test')).render(
            <TestSwitchCase />
        );
    </script>
</body>
</html>
